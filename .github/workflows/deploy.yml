# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

# TODO: Add a job that runs on non-main branches that will lint the code, run tests, and generate a coverage report, but not deploy to GitHub Pages whenever a commit is pushed or a PR is opened. This will help ensure that the code is in good shape before it gets merged into main and deployed to GitHub Pages.
# TODO: Require that all unit tests pass and code coverage is 100% before PR can be approved
# TODO: Add a job that will validate and require that the code will build properly without saving the artifacts after the lint and test job(s) are done running.

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ['main']

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets the GITHUB_TOKEN permissions to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: lts/*
      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.6.0
      - name: Install dependencies
        run: pnpm ci
      - name: Build
        run: pnpm build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      - name: Setup Pages
        uses: actions/configure-pages@v6.0.0
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          # Upload dist folder
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
